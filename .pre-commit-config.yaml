# Pre-commit hooks pinned to the same lint versions used in CI.
# Versions must match constraints/lint.txt.
# Install: pre-commit install
# Run all: pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--output-format=github]
      - id: ruff-format

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-d, relaxed]
        files: \.(yaml|yml)$
